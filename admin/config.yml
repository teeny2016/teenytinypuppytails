# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: teeny2016/teenytinypuppytails
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/be395071-21b9-4da5-be79-f65e4a74be95/pkce
  auth_token_endpoint: /sites/be395071-21b9-4da5-be79-f65e4a74be95/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url
logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://teenytinypuppytails.org

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: site
    label: "Your website content"
    description: "Edit your dogs, reviews, gallery photos and home-page numbers here."
    files:
      - name: data
        label: "Dogs, Reviews, Gallery & Numbers"
        file: "site-content.json"
        description: "Everything that shows on your site."
        fields:
          - label: "Home-page numbers"
            name: stats
            widget: object
            fields:
              - { label: "Available litters", name: available, widget: number, value_type: int, default: 0 }
              - { label: "Upcoming litters", name: upcoming, widget: number, value_type: int, default: 0 }
              - { label: "Happy families", name: families, widget: number, value_type: int, default: 0 }
              - { label: "Families on waitlist", name: waitlist, widget: number, value_type: int, default: 0 }

          - label: "Parent dogs"
            name: parents
            label_singular: "dog"
            widget: list
            summary: "{{fields.name}} - {{fields.role}}"
            fields:
              - { label: "Name", name: name, widget: string }
              - { label: "Role", name: role, widget: select, options: ["Dam", "Sire"] }
              - { label: "Breed", name: breed, widget: string, default: "Miniature Dachshund" }
              - { label: "Coat", name: coat, widget: select, options: ["Smooth", "Wirehaired", "Long-haired"], required: false }
              - { label: "Color", name: color, widget: string, required: false }
              - { label: "Registration", name: reg, widget: string, required: false, hint: "for example: AKC registered, or AKC & CKC registered" }
              - { label: "Description", name: description, widget: text, required: false }
              - label: "Photos"
                name: photos
                widget: list
                field: { label: "Photo", name: photo, widget: image }

          - label: "Reviews"
            name: reviews
            label_singular: "review"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: "Family name", name: name, widget: string }
              - { label: "Date", name: date, widget: string, required: false, hint: "for example: May 2026" }
              - { label: "Their puppy's photo", name: photo, widget: image, required: false }
              - { label: "Review text", name: text, widget: text }

          - label: "Gallery photos"
            name: gallery
            label_singular: "photo"
            widget: list
            field: { label: "Photo", name: photo, widget: image }
